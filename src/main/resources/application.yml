spring:
  application:
    name: backend_Toyproject

  datasource:
    url: jdbc:sqlite:local.db
    driver-class-name: org.sqlite.JDBC

  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect

    hibernate:
      ddl-auto: update

    show-sql: true
    open-in-view: false
    defer-datasource-initialization: true

    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
        highlight_sql: true
        jdbc:
          batch_size: 0
        order_inserts: false
        order_updates: true

  sql:
    init:
      mode: always

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

  api-docs:
    path: /api-docs

  show-actuator: true

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.springframework.web: DEBUG

server:
  port: 8080
  servlet:
    context-path: /api